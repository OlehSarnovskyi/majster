<footer class="footer">
  <div class="container">
    <div class="footer__grid">
      <div class="footer__brand">
        <a routerLink="/" class="footer__logo">
          <span class="material-icons-outlined">handyman</span>
          <span>Majster<span class="footer__dot">.sk</span></span>
        </a>
        <p class="footer__tagline">Nájdite a rezervujte overených majstrov na Slovensku.</p>
      </div>

      <div class="footer__col">
        <h4>Platforma</h4>
        <a routerLink="/categories">Služby</a>
        <a routerLink="/masters">Majstri</a>
        <a [routerLink]="joinAsMasterRoute">Pridať sa ako majster</a>
      </div>

      <div class="footer__col">
        <h4>Informácie</h4>
        <a routerLink="/privacy">Ochrana súkromia</a>
        <a routerLink="/terms">Podmienky používania</a>
        <a routerLink="/cookies">Cookies</a>
      </div>
    </div>

    <div class="footer__bottom">
      <span>&copy; {{ year }} Majster.sk. Všetky práva vyhradené.</span>
    </div>
  </div>
</footer>
