<header class="header">
  <div class="header__inner container">
    <a routerLink="/" class="header__logo">
      <span class="header__logo-icon material-icons-outlined">handyman</span>
      <span class="header__logo-text">Majster<span class="header__logo-dot">.sk</span></span>
    </a>

    <nav class="header__nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/categories" routerLinkActive="active">Services</a>
      <a routerLink="/masters" routerLinkActive="active">Masters</a>
    </nav>

    <div class="header__actions">
      @if (auth.isLoggedIn()) {
        <a routerLink="/dashboard" class="header__user">
          <span class="material-icons-outlined">person</span>
          <span>{{ auth.user()?.firstName }}</span>
        </a>
        <button class="btn btn--ghost btn--sm" (click)="auth.logout()">Log out</button>
      } @else {
        <a routerLink="/auth/login" class="btn btn--ghost btn--sm">Log in</a>
        <a routerLink="/auth/register" class="btn btn--primary btn--sm">Sign up</a>
      }
    </div>
  </div>
</header>
