<div class="container">
  <div class="profile-form">
    <h1>Upraviť profil</h1>
    <p class="text-muted mt-1">Aktualizujte svoje osobné údaje</p>

    @if (error()) {
      <div class="alert alert--error mt-2">{{ error() }}</div>
    }
    @if (saved()) {
      <div class="alert alert--success mt-2">Profil bol úspešne aktualizovaný!</div>
    }

    <!-- Avatar upload -->
    <div class="avatar-section mt-3">
      <div class="avatar-wrapper">
        @if (avatarPreview()) {
          <img [src]="avatarPreview()" alt="Avatar" class="avatar-img" />
        } @else {
          <div class="avatar-placeholder">
            <span class="material-icons-outlined">person</span>
          </div>
        }
        @if (uploadingAvatar()) {
          <div class="avatar-loading">
            <span class="material-icons-outlined spinning">sync</span>
          </div>
        }
      </div>
      <div class="avatar-info">
        <label for="avatar-upload" class="btn btn--ghost btn--sm">
          <span class="material-icons-outlined">photo_camera</span>
          Zmeniť fotku
        </label>
        <input
          id="avatar-upload"
          type="file"
          accept="image/jpeg,image/png,image/webp"
          (change)="onAvatarSelected($event)"
          hidden
        />
        <p class="text-muted text-sm">JPEG, PNG alebo WebP, max 5 MB</p>
      </div>
    </div>

    <div class="form-row mt-3">
      <div class="form-field">
        <label class="form-field__label" for="profile-first-name">Meno</label>
        <input id="profile-first-name" class="form-field__input" [(ngModel)]="firstName" />
      </div>
      <div class="form-field">
        <label class="form-field__label" for="profile-last-name">Priezvisko</label>
        <input id="profile-last-name" class="form-field__input" [(ngModel)]="lastName" />
      </div>
    </div>

    <div class="form-field">
      <label class="form-field__label" for="profile-phone">Telefón</label>
      <input id="profile-phone" class="form-field__input" [(ngModel)]="phone" placeholder="+421 ..." />
    </div>

    @if (auth.isMaster()) {
      <div class="form-field">
        <label class="form-field__label" for="profile-bio">O mne</label>
        <textarea id="profile-bio" class="form-field__input" [(ngModel)]="bio" rows="4"
          placeholder="Povedzte klientom o sebe a svojich skúsenostiach..."></textarea>
      </div>
    }

    <button class="btn btn--primary btn--lg" (click)="save()" [disabled]="saving()">
      {{ saving() ? 'Ukladá sa...' : 'Uložiť zmeny' }}
    </button>
  </div>
</div>
