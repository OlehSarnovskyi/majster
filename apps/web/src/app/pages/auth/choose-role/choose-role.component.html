<div class="role-page">
  <div class="role-card">
    <h1>Ako budete používať Majster.sk?</h1>
    <p class="text-muted mb-3">Môžete to zmeniť neskôr v nastaveniach</p>

    <div class="role-options">
      <button
        class="role-option"
        [class.role-option--selected]="selectedRole() === 'CLIENT'"
        (click)="selectRole('CLIENT')"
      >
        <span class="role-option__icon material-icons-outlined">person_search</span>
        <h3>Hľadám majstra</h3>
        <p>Prehliadajte služby a rezervujte profesionálov</p>
      </button>

      <button
        class="role-option"
        [class.role-option--selected]="selectedRole() === 'MASTER'"
        (click)="selectRole('MASTER')"
      >
        <span class="role-option__icon material-icons-outlined">engineering</span>
        <h3>Som majster</h3>
        <p>Ponúkajte svoje služby a získajte klientov</p>
      </button>
    </div>

    <button
      class="btn btn--primary btn--lg btn--full mt-3"
      [disabled]="!selectedRole() || loading()"
      (click)="confirm()"
    >
      {{ loading() ? 'Nastavuje sa...' : 'Pokračovať' }}
    </button>
  </div>
</div>
