<div class="auth-page">
  <div class="auth-card card">
    <div class="card__body">
      <div class="auth-card__header">
        <h1>Vitajte späť</h1>
        <p class="text-muted">Prihláste sa do svojho účtu</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        @if (error()) {
          <div class="auth-card__error">{{ error() }}</div>
        }

        <div class="form-field" [class.form-field--error]="emailError">
          <label class="form-field__label" for="login-email">Email</label>
          <input
            class="form-field__input"
            [class.form-field__input--error]="emailError"
            type="email"
            id="login-email"
            placeholder="vas@email.com"
            [(ngModel)]="email"
            name="email"
            (blur)="submitted = true"
          />
          @if (emailError) {
            <span class="form-field__error">{{ emailError }}</span>
          }
        </div>

        <div class="form-field" [class.form-field--error]="passwordError">
          <label class="form-field__label" for="login-password">Heslo</label>
          <input
            class="form-field__input"
            [class.form-field__input--error]="passwordError"
            type="password"
            id="login-password"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            (blur)="submitted = true"
          />
          @if (passwordError) {
            <span class="form-field__error">{{ passwordError }}</span>
          }
        </div>

        <button
          type="submit"
          class="btn btn--primary btn--full"
          [disabled]="loading()"
        >
          {{ loading() ? 'Prihlasuje sa...' : 'Prihlásiť sa' }}
        </button>
      </form>

      <p class="auth-card__footer">
        Nemáte účet? <a routerLink="/auth/register">Zaregistrovať sa</a>
      </p>
    </div>
  </div>
</div>
