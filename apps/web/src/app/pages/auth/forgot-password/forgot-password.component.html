<div class="auth-page">
  <div class="auth-card card">
    <div class="card__body">
      <div class="auth-card__header">
        <h1>Zabudnuté heslo</h1>
        <p class="text-muted">Zadajte váš e-mail a pošleme vám odkaz na obnovenie hesla</p>
      </div>

      @if (success()) {
        <div class="auth-card__success">
          Ak tento e-mail existuje, bol naň odoslaný odkaz na obnovenie hesla.
        </div>
        <p class="auth-card__footer">
          <a routerLink="/auth/login">Späť na prihlásenie</a>
        </p>
      } @else {
        <form (ngSubmit)="onSubmit()">
          @if (error()) {
            <div class="auth-card__error">{{ error() }}</div>
          }

          <div class="form-field" [class.form-field--error]="emailError">
            <label class="form-field__label" for="forgot-email">Email</label>
            <input
              class="form-field__input"
              [class.form-field__input--error]="emailError"
              type="email"
              id="forgot-email"
              placeholder="vas@email.com"
              [(ngModel)]="email"
              name="email"
              (blur)="submitted = true"
            />
            @if (emailError) {
              <span class="form-field__error">{{ emailError }}</span>
            }
          </div>

          <button
            type="submit"
            class="btn btn--primary btn--full"
            [disabled]="loading()"
          >
            {{ loading() ? 'Odosiela sa...' : 'Odoslať odkaz' }}
          </button>
        </form>

        <p class="auth-card__footer">
          <a routerLink="/auth/login">Späť na prihlásenie</a>
        </p>
      }
    </div>
  </div>
</div>
