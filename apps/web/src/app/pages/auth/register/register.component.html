<div class="auth-page">
  <div class="auth-card card">
    <div class="card__body">
      <div class="auth-card__header">
        <h1>Vytvoriť účet</h1>
        <p class="text-muted">Pridajte sa k Majster.sk ešte dnes</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        @if (error()) {
          <div class="auth-card__error">{{ error() }}</div>
        }

        <div class="form-field" [class.form-field--error]="firstNameError">
          <label class="form-field__label">Meno</label>
          <input
            class="form-field__input"
            [class.form-field__input--error]="firstNameError"
            type="text"
            placeholder="Ján"
            [(ngModel)]="firstName"
            name="firstName"
            minlength="2"
            (blur)="submitted = true"
          />
          @if (firstNameError) {
            <span class="form-field__error">{{ firstNameError }}</span>
          }
        </div>

        <div class="form-field" [class.form-field--error]="lastNameError">
          <label class="form-field__label">Priezvisko</label>
          <input
            class="form-field__input"
            [class.form-field__input--error]="lastNameError"
            type="text"
            placeholder="Novák"
            [(ngModel)]="lastName"
            name="lastName"
            minlength="2"
            (blur)="submitted = true"
          />
          @if (lastNameError) {
            <span class="form-field__error">{{ lastNameError }}</span>
          }
        </div>

        <div class="form-field" [class.form-field--error]="emailError">
          <label class="form-field__label">Email</label>
          <input
            class="form-field__input"
            [class.form-field__input--error]="emailError"
            type="email"
            placeholder="vas@email.com"
            [(ngModel)]="email"
            name="email"
            (blur)="submitted = true"
          />
          @if (emailError) {
            <span class="form-field__error">{{ emailError }}</span>
          }
        </div>

        <div class="form-field" [class.form-field--error]="passwordError">
          <label class="form-field__label">Heslo</label>
          <input
            class="form-field__input"
            [class.form-field__input--error]="passwordError"
            type="password"
            placeholder="Min. 6 znakov"
            [(ngModel)]="password"
            name="password"
            minlength="6"
            (blur)="submitted = true"
          />
          @if (passwordError) {
            <span class="form-field__error">{{ passwordError }}</span>
          }
        </div>

        <label class="gdpr-checkbox">
          <input type="checkbox" [(ngModel)]="gdprConsent" name="gdpr" />
          <span>Súhlasím so <a routerLink="/privacy" target="_blank">Zásadami ochrany súkromia</a> a <a routerLink="/terms" target="_blank">Podmienkami používania</a></span>
        </label>

        <button
          type="submit"
          class="btn btn--primary btn--full"
          [disabled]="loading()"
        >
          {{ loading() ? 'Vytvára sa účet...' : 'Vytvoriť účet' }}
        </button>
      </form>

      <p class="auth-card__footer">
        Už máte účet? <a routerLink="/auth/login">Prihlásiť sa</a>
      </p>
    </div>
  </div>
</div>
