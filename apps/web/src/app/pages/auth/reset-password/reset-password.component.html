<div class="auth-page">
  <div class="auth-card card">
    <div class="card__body">
      <div class="auth-card__header">
        <h1>Nové heslo</h1>
        <p class="text-muted">Zadajte svoje nové heslo</p>
      </div>

      @if (success()) {
        <div class="auth-card__success">
          Heslo bolo úspešne zmenené. Presmerujeme vás na prihlásenie...
        </div>
      } @else {
        <form (ngSubmit)="onSubmit()">
          @if (error()) {
            <div class="auth-card__error">{{ error() }}</div>
          }

          <div class="form-field" [class.form-field--error]="passwordError">
            <label class="form-field__label" for="reset-password">Nové heslo</label>
            <input
              class="form-field__input"
              [class.form-field__input--error]="passwordError"
              type="password"
              id="reset-password"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              (blur)="submitted = true"
            />
            @if (passwordError) {
              <span class="form-field__error">{{ passwordError }}</span>
            }
          </div>

          <div class="form-field" [class.form-field--error]="confirmError">
            <label class="form-field__label" for="reset-confirm">Potvrdiť heslo</label>
            <input
              class="form-field__input"
              [class.form-field__input--error]="confirmError"
              type="password"
              id="reset-confirm"
              placeholder="••••••••"
              [(ngModel)]="passwordConfirm"
              name="passwordConfirm"
              (blur)="submitted = true"
            />
            @if (confirmError) {
              <span class="form-field__error">{{ confirmError }}</span>
            }
          </div>

          <button
            type="submit"
            class="btn btn--primary btn--full"
            [disabled]="loading() || !token"
          >
            {{ loading() ? 'Ukladá sa...' : 'Nastaviť heslo' }}
          </button>
        </form>

        <p class="auth-card__footer">
          <a routerLink="/auth/login">Späť na prihlásenie</a>
        </p>
      }
    </div>
  </div>
</div>
